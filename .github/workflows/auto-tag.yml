name: Auto Tag

on:
    push:
        branches: [main]

permissions:
    contents: write

jobs:
    tag:
        name: Create version tag
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GH_PAT }}

            - name: Read version from pubspec.yaml
              id: version
              run: |
                  echo "value=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)" >> $GITHUB_OUTPUT

            - name: Check if tag already exists
              id: tag_check
              run: |
                  if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.value }}" | grep -q .; then
                    echo "exists=true" >> $GITHUB_OUTPUT
                  else
                    echo "exists=false" >> $GITHUB_OUTPUT
                  fi

            - name: Create and push tag
              if: steps.tag_check.outputs.exists == 'false'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag "v${{ steps.version.outputs.value }}"
                  git push origin "v${{ steps.version.outputs.value }}"
