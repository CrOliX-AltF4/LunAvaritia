name: Build APK

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    apk:
        name: Build & upload debug APK
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.24.0"
                  channel: stable
                  cache: true

            - name: Inject google-services.json
              env:
                  GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
              run: echo "$GOOGLE_SERVICES_JSON_B64" | base64 -d > android/app/google-services.json

            - name: Install dependencies
              run: flutter pub get

            - name: Build APK (debug)
              run: flutter build apk --debug

            - name: Upload APK to release
              uses: softprops/action-gh-release@v2
              with:
                  files: build/app/outputs/flutter-apk/app-debug.apk
