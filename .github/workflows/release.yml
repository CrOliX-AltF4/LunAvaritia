name: Create Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        name: Validate & Create GitHub Release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.24.0"
                  channel: stable
                  cache: true

            - name: Install dependencies
              run: flutter pub get

            - name: Run tests
              run: flutter test

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
