name: lunavaritia
description: "Lun'Avaritia — mobile companion for the Lun ecosystem"
version: 1.2.0+4
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # HTTP
  http: ^1.2.2
  # State management
  provider: ^6.1.2
  # Local storage (server URL + token)
  shared_preferences: ^2.3.0
  # Firebase push notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2
  # Time formatting
  timeago: ^3.6.1
  # Cupertino icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
